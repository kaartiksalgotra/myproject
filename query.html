<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jammu Journeys | Query</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Send a query or contact us for more information about your Jammu trip.">
</head>
<body>

    <header>
        <a href="index.html" class="logo">JAMMU JOURNEYS</a>
        <button class="menu-toggle" id="mobile-menu">&#9776;</button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="places.html">Places</a></li>
                <li><a href="food.html">Food</a></li>
                <li><a href="culture.html">Culture</a></li>
                <li><a href="query.html">Query</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="section-title">Send a Query</h1>
        <p class="section-subtitle">Have questions about your trip? We are here to help.</p>

        <!-- question form section -->
        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="xyz@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="message">Your Message or Inquiry</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you plan your visit?" required></textarea>
            </div>
            
            <button type="submit" class="btn">Send Message</button>
        </form>
    </main>

    <footer>
        <div class="footer-content">
            <h3>Jammu Journeys</h3>
            <p>Your gateway to the hidden gems of Jammu.</p>
            <div class="footer-links">
                <a href="" target="_blank">Search on Google</a>
                <a href="" target="_blank">Open Google Maps</a>
            </div>
            <p>&copy; 2026 Jammu Journeys. </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
