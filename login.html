<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jammu Journeys | Login</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Login to Jammu Journeys to start exploring.">
</head>
<body>

    <header>
        <a href="index.html" class="logo">JAMMU JOURNEYS</a>
        <button class="menu-toggle" id="mobile-menu">&#9776;</button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="places.html">Places</a></li>
                <li><a href="food.html">Food</a></li>
                <li><a href="culture.html">Culture</a></li>
                <li><a href="query.html">Query</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="section-title">Welcome Back</h1>
        <p class="section-subtitle">Login to start exploring the best of Jammu.</p>

        <!-- Login form — JS handles the submit event -->
        <form id="loginForm" class="contact-form">

            <div class="form-group">
                <label for="loginName">Your Name</label>
                <input type="text" id="loginName" placeholder="Enter Your name">
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>

            <!-- error message shown by JS if fields are empty -->
            <p id="loginError" style="color: #e74c3c; font-size: 14px; margin-bottom: 10px;"></p>

            <button type="submit" class="btn">Login</button>

        </form>
    </main>

    <footer>
        <div class="footer-content">
            <h3>Jammu Journeys</h3>
            <p>Your gateway to the hidden gems of Jammu.</p>
            <div class="footer-links">
                <a href="https://www.google.com/search?q=Jammu+City" target="_blank">Search on Google</a>
                <a href="https://www.google.com/maps/search/Jammu+City" target="_blank">Open Google Maps</a>
            </div>
            <p>&copy; 2026 Jammu Journeys.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
